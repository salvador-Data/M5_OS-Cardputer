; M5 OS - Cardputer firmware (Cardputer-Adv uses same microSD GPIO per M5 docs)
; https://docs.m5stack.com/en/core/Cardputer

[platformio]
extra_configs = platformio_bootloader.ini

[env:m5stack-cardputer]
platform = espressif32 @ ^6.9.0
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
board_build.partitions = partitions/m5os_cardputer_8MB.csv
board_build.sdkconfig = sdkconfig.defaults
board_build.arduino.variant = m5os-cardputer
board_build.arduino.custom_bootloader = bootloader
extra_scripts =
    pre:scripts/prebuild_bootloader.py
    pre:scripts/prebuild_gateway_embed.py
    post:scripts/upload_all_extra.py
framework = arduino
monitor_speed = 115200
upload_speed = 1500000
build_src_filter = +<*> -<session_gateway_main.cpp>
build_flags =
    -I include
    -std=gnu++17
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DM5OS_MANIFEST_URL=\"https://raw.githubusercontent.com/salvador-Data/M5_OS-Cardputer/main/data/manifest.example.json\"
    -DM5OS_UTMS_PACK_URL=\"https://raw.githubusercontent.com/salvador-Data/M5_OS-Cardputer/main/data/threat_pack.example.json\"
    -DIR_TX_PIN=44
    -DIR_RX_PIN=1
lib_deps =
    m5stack/M5Cardputer@^1.0.2
    m5stack/M5GFX@^0.2.22
    bblanchon/ArduinoJson@^7.2.0
    IRremote@^4.7.1

; Optional session gateway env (not required for Load app)
[env:m5os-session-gateway]
platform = espressif32 @ ^6.9.0
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
board_build.partitions = partitions/m5os_cardputer_8MB.csv
board_build.sdkconfig = sdkconfig.defaults
framework = arduino
build_src_filter = -<*> +<session_gateway_main.cpp> +<m5os_otadata.cpp>
monitor_speed = 115200
upload_speed = 1500000
build_flags =
    -I include
    -std=gnu++17
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DM5OS_SESSION_GATEWAY=1
lib_deps =
    m5stack/M5Cardputer@^1.0.2
    m5stack/M5GFX@^0.2.22
