; Custom bootloader (bootloader_components/main) — built via prebuild_bootloader.py

[env:m5stack-cardputer-bootloader]
platform = espressif32 @ ^6.9.0
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.flash_size = 8MB
board_build.partitions = partitions/m5os_cardputer_8MB.csv
board_build.sdkconfig = sdkconfig.defaults
board_build.cmake_extra_args = -DM5OS_BOOTLOADER_STUB=ON
framework = espidf
monitor_speed = 115200
