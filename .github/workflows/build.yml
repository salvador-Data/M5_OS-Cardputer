name: Build firmware

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  platformio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
          key: ${{ runner.os }}-pio
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PlatformIO
        run: pip install platformio intelhex
      - name: Generate gateway embed sources
        run: python scripts/gen_gateway_embed_from_data.py
      - name: Build Cardputer firmware
        run: pio run -e m5stack-cardputer
      - name: Validate manifest JSON
        run: python scripts/validate_manifest.py data/manifest.example.json
      - name: Run host-side tests
        run: pip install pytest && pytest tests/ -v
